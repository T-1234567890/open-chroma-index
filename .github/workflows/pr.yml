name: PR CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      core: ${{ steps.filter.outputs.core }}
      cli: ${{ steps.filter.outputs.cli }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            core:
              - 'src/**'
              - 'registry/**'
              - 'spec/**'
              - 'tools/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'README.md'
              - 'install.sh'
              - '.github/workflows/**'
            cli:
              - 'cli/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'README.md'
              - 'install.sh'
              - '.github/workflows/**'

  core:
    name: Core checks (${{ matrix.os }})
    needs: changes
    if: needs.changes.outputs.core == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint core
        run: cargo clippy -p open-chroma-index --all-targets --all-features -- -D warnings

      - name: Test core
        run: cargo test -p open-chroma-index --all-features

      - name: Package core dry-run
        run: cargo package --allow-dirty

  cli:
    name: CLI checks (${{ matrix.os }})
    needs: changes
    if: needs.changes.outputs.cli == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint CLI
        run: cargo clippy -p oci-cli --all-targets --all-features -- -D warnings

      - name: Test CLI
        run: cargo test -p oci-cli --all-features

      - name: Validate registry through CLI
        run: cargo run -p oci-cli -- registry validate

      - name: Smoke encode JSON
        run: cargo run -p oci-cli -- encode "#E85A9A" --space hex --format json

      - name: Package CLI dry-run
        run: cargo package --allow-dirty --manifest-path cli/Cargo.toml --config 'patch.crates-io.open-chroma-index.path="."'
